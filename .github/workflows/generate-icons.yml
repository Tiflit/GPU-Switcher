name: Generate Icons

on:
  push:
    paths:
      - "icons/svg/*.svg"
  workflow_dispatch:

jobs:
  build-icons:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ImageMagick + PNG optimizer
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick optipng

          # Allow ImageMagick to read SVGs (Ubuntu blocks this by default)
          sudo sed -i 's/disable="read" pattern="SVG"/pattern="SVG"/' /etc/ImageMagick-6/policy.xml

      - name: Prepare output folders
        run: |
          rm -rf icons/png
          rm -rf icons/ico
          mkdir -p icons/png
          mkdir -p icons/ico

      - name: Generate PNGs and ICOs
        run: |
          shopt -s nullglob
          for svg in icons/svg/*.svg; do
            base=$(basename "$svg" .svg)
            echo "Processing $base.svg"

            # PNG sizes
            for size in 16 24 32 48 64 128 256; do
              convert -background none "$svg" -resize ${size}x${size} \
                "icons/png/${base}-${size}.png"
            done

            # Optimize PNGs (lossless)
            for png in icons/png/${base}-*.png; do
              optipng -o7 "$png"
            done

            # ICO (Windows-relevant sizes)
            convert \
              icons/png/${base}-16.png \
              icons/png/${base}-24.png \
              icons/png/${base}-32.png \
              icons/png/${base}-48.png \
              icons/png/${base}-64.png \
              icons/png/${base}-128.png \
              icons/png/${base}-256.png \
              "icons/ico/${base}.ico"
          done

      - name: Commit generated icons
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate PNG and ICO icons"
          file_pattern: icons/png/* icons/ico/*
